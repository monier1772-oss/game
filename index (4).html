<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Game</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0f14;--surface:#161923;--surface2:#1e2330;--border:#2a3044;--accent:#5b7fff;--accent2:#a78bfa;--text:#e8ecf4;--text-muted:#6b7a9b;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  #login-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:360px;text-align:center}
  .login-card .icon{font-size:48px;margin-bottom:16px}
  .login-card h2{font-size:22px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .login-card p{color:var(--text-muted);font-size:14px;margin-bottom:28px}
  .name-options{display:flex;flex-direction:column;gap:12px}
  .name-btn{padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Tajawal',sans-serif;font-size:16px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
  .name-btn:hover{border-color:var(--accent);background:rgba(91,127,255,.1);transform:translateY(-2px)}
  .name-btn.user1{border-color:rgba(91,127,255,.4)}.name-btn.user2{border-color:rgba(167,139,250,.4)}
  #chat-screen{display:none;flex-direction:column;height:100vh}
  header{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:rgba(13,15,20,.9);backdrop-filter:blur(12px);z-index:10}
  .hdr-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .hdr-avatar.av1{background:linear-gradient(135deg,#2563eb,#7c3aed)}.hdr-avatar.av2{background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .header-info{flex:1}.header-info h1{font-size:15px;font-weight:600}
  .online-badge{font-size:12px;color:#4ade80;display:flex;align-items:center;gap:5px}
  .online-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  #messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
  #messages::-webkit-scrollbar{width:4px}#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .msg-row{display:flex;gap:8px;position:relative;margin-bottom:6px}
  .msg-row.mine{flex-direction:row-reverse}
  .msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
  .msg-av.av1{background:linear-gradient(135deg,#2563eb,#7c3aed)}.msg-av.av2{background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .msg-content{max-width:75%;position:relative}
  .sender-name{font-size:11px;color:var(--text-muted);margin-bottom:3px;padding:0 4px}
  .msg-row.mine .sender-name{text-align:right}
  .reply-preview{background:rgba(255,255,255,0.05);border-right:3px solid var(--accent);border-radius:6px;padding:5px 8px;margin-bottom:6px;font-size:12px;color:var(--text-muted);cursor:pointer}
  .msg-row.mine .reply-preview{border-right:none;border-left:3px solid var(--accent2)}
  .reply-preview .reply-sender{font-weight:600;color:var(--accent);margin-bottom:2px;font-size:11px}
  .msg-row.mine .reply-preview .reply-sender{color:var(--accent2)}
  .reply-preview .reply-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
  .bubble{padding:10px 14px;border-radius:16px;font-size:14.5px;line-height:1.6;word-break:break-word;white-space:pre-wrap;position:relative;-webkit-user-select:none;user-select:none;touch-action:manipulation}
  .msg-row.mine .bubble{background:#1e3a5f;border:1px solid rgba(37,99,235,.3);border-top-right-radius:4px;color:#dbeafe}
  .msg-row:not(.mine) .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px}
  .bubble.img-bubble{padding:4px;background:transparent;border:none}
  .bubble.img-bubble img{max-width:220px;max-height:220px;border-radius:12px;display:block;cursor:pointer;object-fit:cover;border:1px solid var(--border)}
  .bubble.voice-bubble{padding:8px 12px;display:flex;align-items:center;gap:10px;min-width:180px}
  .play-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--accent);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .voice-duration{font-size:12px;color:var(--text-muted)}
  .voice-wave{flex:1;height:20px;display:flex;align-items:center;gap:2px}
  .voice-wave span{display:inline-block;width:3px;border-radius:2px;background:var(--accent);opacity:.6;animation:wave 1s infinite ease-in-out}
  .voice-wave span:nth-child(1){height:8px}.voice-wave span:nth-child(2){height:14px;animation-delay:.1s}.voice-wave span:nth-child(3){height:10px;animation-delay:.2s}.voice-wave span:nth-child(4){height:16px;animation-delay:.3s}.voice-wave span:nth-child(5){height:8px;animation-delay:.4s}.voice-wave span:nth-child(6){height:12px;animation-delay:.2s}.voice-wave span:nth-child(7){height:6px;animation-delay:.1s}
  @keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}
  .reactions-bar{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;padding:0 4px}
  .reaction-badge{display:flex;align-items:center;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:2px 7px;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .reaction-badge.mine-react{border-color:var(--accent);background:rgba(91,127,255,.15)}
  .reaction-badge .r-count{font-size:11px;color:var(--text-muted)}
  .msg-time{font-size:11px;color:var(--text-muted);margin-top:3px;padding:0 4px}
  .msg-row.mine .msg-time{text-align:right}
  .msg-footer{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:2px;padding:0 4px}
  .msg-row:not(.mine) .msg-footer{justify-content:flex-start}
  .read-tick{font-size:12px;color:var(--text-muted)}
  .read-tick.seen{color:#4ade80}
  .date-divider{text-align:center;font-size:12px;color:var(--text-muted);padding:8px 0;position:relative}
  .date-divider::before,.date-divider::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:var(--border)}
  .date-divider::before{right:0}.date-divider::after{left:0}
  #action-sheet{position:fixed;inset:0;z-index:50;display:none}
  #action-sheet.open{display:block}
  #action-sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
  #action-sheet-box{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;padding:16px;animation:slideUp .2s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet-reacts{display:flex;justify-content:space-around;padding:8px 0 16px;border-bottom:1px solid var(--border);margin-bottom:12px}
  .sheet-react-btn{background:none;border:none;font-size:30px;cursor:pointer;padding:8px;border-radius:12px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .sheet-action{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;cursor:pointer;font-size:15px;color:var(--text);background:none;border:none;width:100%;font-family:'Tajawal',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .sheet-action:active{background:var(--surface2)}
  .sheet-action span{font-size:20px}
  #reply-bar{display:none;align-items:center;gap:8px;background:var(--surface2);border-top:1px solid var(--border);padding:8px 14px;font-size:13px}
  .rb-line{width:3px;min-height:30px;border-radius:2px;background:var(--accent);align-self:stretch}
  .rb-info{flex:1}
  .rb-sender{font-weight:600;color:var(--accent);font-size:11px;margin-bottom:2px}
  .rb-text{color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:250px}
  #reply-bar button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px;padding:0 4px}
  #typing-indicator{padding:4px 16px 0;font-size:12px;color:var(--text-muted);min-height:20px;display:flex;align-items:center;gap:6px}
  .typing-dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite}
  .typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}
  .input-wrap{padding:10px 16px;border-top:1px solid var(--border);background:rgba(13,15,20,.9);backdrop-filter:blur(12px)}
  #rec-indicator{display:none;align-items:center;gap:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:8px 14px;margin-bottom:8px;font-size:13px;color:#f87171}
  #rec-indicator .rec-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:pulse 1s infinite}
  #rec-timer{margin-right:auto}
  #cancel-rec{background:none;border:none;color:#f87171;cursor:pointer;font-size:18px;padding:0 4px}
  .input-box{display:flex;align-items:flex-end;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:8px 10px 8px 12px;transition:border-color .2s}
  .input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,127,255,.1)}
  #msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14.5px;resize:none;max-height:100px;line-height:1.5;direction:rtl}
  #msg-input::placeholder{color:var(--text-muted)}
  .act-btn{width:38px;height:38px;border-radius:10px;border:none;background:var(--surface2);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .act-btn.recording{background:rgba(239,68,68,.2);color:#ef4444;animation:pulse 1s infinite}
  #send-btn{width:42px;height:42px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(91,127,255,.35);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  #send-btn:active{transform:scale(.93)}
  .upload-progress{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--surface2);border-radius:10px;font-size:12px;color:var(--text-muted);margin-bottom:6px}
  .progress-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
  #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;align-items:center;justify-content:center}
  #lightbox.open{display:flex}
  #lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
  #lightbox-close{position:absolute;top:16px;right:16px;background:none;border:none;color:white;font-size:28px;cursor:pointer}
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:8px;font-size:14px}
  .empty-state .icon{font-size:36px}
  #img-input{display:none}
  .highlight-msg .bubble{background:rgba(91,127,255,.25)!important;transition:background .8s}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="icon">🕹️</div>
    <h2>Our Game</h2>
    <p>Choose your character</p>
    <div class="name-options">
      <button class="name-btn user1" onclick="login('user1')"><span>🎮</span> Player 1</button>
      <button class="name-btn user2" onclick="login('user2')"><span>🕹️</span> Player 2</button>
    </div>
  </div>
</div>

<div id="chat-screen">
  <header>
    <div class="hdr-avatar av2" id="other-avatar">🕹️</div>
    <div class="header-info">
      <h1 id="chat-title">Our Game</h1>
      <div class="online-badge" id="online-status">Online</div>
    </div>
    <div style="font-size:13px;color:var(--text-muted)" id="my-name-label"></div>
  </header>
  <div id="messages">
    <div class="empty-state"><div class="icon">👾</div><div>Start the conversation!</div></div>
  </div>
  <div id="typing-indicator"></div>
  <div id="reply-bar">
    <div class="rb-line"></div>
    <div class="rb-info">
      <div class="rb-sender" id="rb-sender"></div>
      <div class="rb-text" id="rb-text"></div>
    </div>
    <button ontouchstart="cancelReply()" onclick="cancelReply()">✕</button>
  </div>
  <div class="input-wrap">
    <div id="rec-indicator">
      <div class="rec-dot"></div>
      <span>Recording...</span>
      <span id="rec-timer">0:00</span>
      <button id="cancel-rec" onclick="cancelRecording()">✕</button>
    </div>
    <div id="upload-progress-wrap"></div>
    <div class="input-box">
      <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
      <input type="file" id="img-input" accept="image/*" onchange="handleImageUpload(event)">
      <button class="act-btn" id="img-btn">🖼️</button>
      <button class="act-btn" id="voice-btn">🎤</button>
      <button id="send-btn">➤</button>
    </div>
  </div>
</div>

<div id="action-sheet">
  <div id="action-sheet-bg"></div>
  <div id="action-sheet-box">
    <div class="sheet-reacts" id="sheet-reacts"></div>
    <button class="sheet-action" id="sheet-reply-btn"><span>↩️</span> monier loves you darling</button>
  </div>
</div>

<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, onDisconnect, update } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig={apiKey:"AIzaSyCJLSDYCuy5LGv5xs257vujD2y_Tko2CTI",authDomain:"msmo-6fc52.firebaseapp.com",databaseURL:"https://msmo-6fc52-default-rtdb.firebaseio.com",projectId:"msmo-6fc52",storageBucket:"msmo-6fc52.firebasestorage.app",messagingSenderId:"962595352860",appId:"1:962595352860:web:5efc7fa165a32d89a58ad9"};
const CLOUD="diwelcaar",PRESET="pgkh9dp5";
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const NAMES={user1:'Player 1',user2:'Player 2'};
const AVATARS={user1:'🎮',user2:'🕹️'};
const AVCLS={user1:'av1',user2:'av2'};
const REACTS=['👍','❤️','😂','😢','😮'];

let myId=null,typingTimeout=null,lastDate=null;
let mediaRecorder=null,audioChunks=[],recInterval=null,recSeconds=0,isRecording=false;
let replyTo=null,allMessages={};
let activeSheetMsgId=null,activeSheetMsg=null;

// Buttons setup
document.getElementById('send-btn').addEventListener('touchstart',e=>{e.preventDefault();doSend();},{passive:false});
document.getElementById('send-btn').addEventListener('click',e=>{e.preventDefault();doSend();});
document.getElementById('img-btn').addEventListener('touchstart',e=>{e.preventDefault();document.getElementById('img-input').click();},{passive:false});
document.getElementById('img-btn').addEventListener('click',()=>document.getElementById('img-input').click());
document.getElementById('voice-btn').addEventListener('touchstart',e=>{e.preventDefault();startRecording();},{passive:false});
document.getElementById('voice-btn').addEventListener('touchend',e=>{e.preventDefault();stopRecording();},{passive:false});
document.getElementById('voice-btn').addEventListener('mousedown',startRecording);
document.getElementById('voice-btn').addEventListener('mouseup',stopRecording);
document.getElementById('action-sheet-bg').addEventListener('touchstart',e=>{e.preventDefault();closeSheet();},{passive:false});
document.getElementById('action-sheet-bg').addEventListener('click',closeSheet);
document.getElementById('sheet-reply-btn').addEventListener('touchstart',e=>{e.preventDefault();sheetReply();},{passive:false});
document.getElementById('sheet-reply-btn').addEventListener('click',sheetReply);

window.login=function(id){
  myId=id;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('chat-screen').style.display='flex';
  document.getElementById('my-name-label').textContent=NAMES[id];
  const other=id==='user1'?'user2':'user1';
  document.getElementById('other-avatar').textContent=AVATARS[other];
  document.getElementById('other-avatar').className='hdr-avatar '+AVCLS[other];
  document.getElementById('chat-title').textContent='Chat with '+NAMES[other];
  const presRef=ref(db,'presence/'+myId);
  set(presRef,true);onDisconnect(presRef).remove();
  onValue(ref(db,'presence/'+other),snap=>{
    const el=document.getElementById('online-status');
    el.textContent=snap.val()?'Online':'Offline';
    el.style.color=snap.val()?'#4ade80':'var(--text-muted)';
  });
  onValue(ref(db,'typing/'+other),snap=>{
    const el=document.getElementById('typing-indicator');
    el.innerHTML=snap.val()?`<span style="color:var(--text-muted)">${NAMES[other]} is typing</span><span class="typing-dots"><span></span><span></span><span></span></span>`:'';
  });
  onValue(ref(db,'messages'),snap=>{
    const data=snap.val();
    allMessages=data||{};
    const c=document.getElementById('messages');
    c.innerHTML='';lastDate=null;
    if(!data){c.innerHTML='<div class="empty-state"><div class="icon">👾</div><div>Start the conversation!</div></div>';return;}
    Object.entries(data).forEach(([k,msg])=>appendMsg(k,msg,c));
    c.scrollTop=c.scrollHeight;
    // Mark other's messages as seen
    Object.entries(data).forEach(([k,msg])=>{
      if(msg.sender===other&&!msg.seen) update(ref(db,'messages/'+k),{seen:true});
    });
  });
  const inp=document.getElementById('msg-input');
  inp.addEventListener('input',()=>{
    inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';
    const tr=ref(db,'typing/'+myId);set(tr,true);
    clearTimeout(typingTimeout);typingTimeout=setTimeout(()=>remove(tr),2000);
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});
  inp.focus();
};

function getPreviewText(msg){
  if(!msg)return'';
  if(msg.type==='image')return'🖼️ Photo';
  if(msg.type==='voice')return'🎤 Voice message';
  return msg.text||'';
}

function appendMsg(msgId,msg,c){
  const date=new Date(msg.timestamp);
  const ds=date.toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long'});
  if(ds!==lastDate){const d=document.createElement('div');d.className='date-divider';d.textContent=ds;c.appendChild(d);lastDate=ds;}
  const isMine=msg.sender===myId;
  const row=document.createElement('div');
  row.className='msg-row '+(isMine?'mine':'');
  row.id='msg-'+msgId;
  const av=document.createElement('div');av.className='msg-av '+AVCLS[msg.sender];av.textContent=AVATARS[msg.sender];
  const content=document.createElement('div');content.className='msg-content';
  const name=document.createElement('div');name.className='sender-name';name.textContent=NAMES[msg.sender];
  content.appendChild(name);
  let bubble;
  if(msg.type==='image'){
    bubble=document.createElement('div');bubble.className='bubble img-bubble';
    if(msg.replyTo)bubble.appendChild(buildReplyPreview(msg.replyTo));
    const img=document.createElement('img');img.src=msg.url;img.onclick=()=>openLightbox(msg.url);
    bubble.appendChild(img);
  } else if(msg.type==='voice'){
    bubble=document.createElement('div');bubble.className='bubble voice-bubble';
    if(msg.replyTo){bubble.style.flexDirection='column';bubble.style.alignItems='stretch';bubble.appendChild(buildReplyPreview(msg.replyTo));const vr=document.createElement('div');vr.style.cssText='display:flex;align-items:center;gap:10px';vr.innerHTML=`<button class="play-btn" id="pb-${msgId}">▶</button><div class="voice-wave"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><span class="voice-duration">${msg.duration||'0:00'}</span>`;bubble.appendChild(vr);}
    else{bubble.innerHTML=`<button class="play-btn" id="pb-${msgId}">▶</button><div class="voice-wave"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><span class="voice-duration">${msg.duration||'0:00'}</span>`;}
    setTimeout(()=>{
      const pb=document.getElementById('pb-'+msgId);
      if(!pb)return;
      let audio=null;
      const toggle=e=>{e.stopPropagation();if(!audio){audio=new Audio(msg.url);}if(audio.paused){audio.play().then(()=>pb.textContent='⏸').catch(()=>{});audio.onended=()=>{pb.textContent='▶';audio=null;};}else{audio.pause();pb.textContent='▶';}};
      pb.addEventListener('touchstart',e=>{e.preventDefault();toggle(e);},{passive:false});
      pb.addEventListener('click',toggle);
    },100);
  } else {
    bubble=document.createElement('div');bubble.className='bubble';
    if(msg.replyTo)bubble.appendChild(buildReplyPreview(msg.replyTo));
    const txt=document.createElement('span');txt.textContent=msg.text;bubble.appendChild(txt);
  }
  let pressTimer=null;
  const startPress=()=>{pressTimer=setTimeout(()=>openSheet(msgId,msg),500);};
  const endPress=()=>{clearTimeout(pressTimer);};
  bubble.addEventListener('touchstart',startPress,{passive:true});
  bubble.addEventListener('touchend',endPress,{passive:true});
  bubble.addEventListener('touchmove',endPress,{passive:true});
  bubble.addEventListener('mousedown',startPress);
  bubble.addEventListener('mouseup',endPress);
  bubble.addEventListener('mouseleave',endPress);
  content.appendChild(bubble);
  if(msg.reactions&&Object.keys(msg.reactions).length>0){
    const bar=document.createElement('div');bar.className='reactions-bar';
    const counts={};const myReacts=new Set();
    Object.entries(msg.reactions).forEach(([uid,emoji])=>{counts[emoji]=(counts[emoji]||0)+1;if(uid===myId)myReacts.add(emoji);});
    Object.entries(counts).forEach(([emoji,count])=>{
      const badge=document.createElement('div');
      badge.className='reaction-badge'+(myReacts.has(emoji)?' mine-react':'');
      badge.innerHTML=`${emoji}<span class="r-count">${count>1?count:''}</span>`;
      badge.addEventListener('touchstart',e=>{e.preventDefault();toggleReaction(msgId,emoji);},{passive:false});
      badge.addEventListener('click',()=>toggleReaction(msgId,emoji));
      bar.appendChild(badge);
    });
    content.appendChild(bar);
  }
  const footer=document.createElement('div');footer.className='msg-footer';
  const timeEl=document.createElement('span');timeEl.className='msg-time';
  timeEl.textContent=date.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  footer.appendChild(timeEl);
  if(isMine){const tick=document.createElement('span');tick.className='read-tick'+(msg.seen?' seen':'');tick.textContent=msg.seen?'✓✓':'✓';footer.appendChild(tick);}
  content.appendChild(footer);
  row.appendChild(av);row.appendChild(content);c.appendChild(row);
}

function buildReplyPreview(rd){
  const div=document.createElement('div');div.className='reply-preview';
  div.innerHTML=`<div class="reply-sender">${NAMES[rd.sender]||rd.sender}</div><div class="reply-text">${getPreviewText(rd)}</div>`;
  div.onclick=e=>{e.stopPropagation();scrollToMsg(rd.id);};
  return div;
}

function scrollToMsg(id){
  const el=document.getElementById('msg-'+id);
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('highlight-msg');setTimeout(()=>el.classList.remove('highlight-msg'),1000);}
}

function openSheet(msgId,msg){
  activeSheetMsgId=msgId;activeSheetMsg=msg;
  const reacts=document.getElementById('sheet-reacts');reacts.innerHTML='';
  const current=msg.reactions?.[myId];
  REACTS.forEach(emoji=>{
    const btn=document.createElement('button');btn.className='sheet-react-btn';btn.textContent=emoji;
    if(current===emoji)btn.style.transform='scale(1.3)';
    btn.addEventListener('touchstart',e=>{e.preventDefault();toggleReaction(msgId,emoji);closeSheet();},{passive:false});
    btn.addEventListener('click',()=>{toggleReaction(msgId,emoji);closeSheet();});
    reacts.appendChild(btn);
  });
  document.getElementById('action-sheet').classList.add('open');
}
function closeSheet(){document.getElementById('action-sheet').classList.remove('open');}
function sheetReply(){setReply(activeSheetMsgId,activeSheetMsg);closeSheet();}

function setReply(id,msg){
  replyTo={id,sender:msg.sender,type:msg.type,text:msg.text,url:msg.url};
  document.getElementById('rb-sender').textContent=NAMES[msg.sender];
  document.getElementById('rb-text').textContent=getPreviewText(msg);
  document.getElementById('reply-bar').style.display='flex';
  document.getElementById('msg-input').focus();
}
window.cancelReply=function(){replyTo=null;document.getElementById('reply-bar').style.display='none';};

function toggleReaction(msgId,emoji){
  const rr=ref(db,`messages/${msgId}/reactions/${myId}`);
  const current=allMessages[msgId]?.reactions?.[myId];
  if(current===emoji)remove(rr);else set(rr,emoji);
}

function doSend(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();if(!text||!myId)return;
  const msgData={sender:myId,type:'text',text,timestamp:Date.now(),seen:false};
  if(replyTo)msgData.replyTo=replyTo;
  push(ref(db,'messages'),msgData);
  remove(ref(db,'typing/'+myId));clearTimeout(typingTimeout);
  inp.value='';inp.style.height='auto';
  window.cancelReply();
  document.getElementById('messages').scrollTop=999999;
}

async function uploadToCloudinary(blob,resType){
  const fd=new FormData();fd.append('file',blob);fd.append('upload_preset',PRESET);
  showProgress(0);
  return new Promise((res,rej)=>{
    const xhr=new XMLHttpRequest();
    xhr.upload.onprogress=e=>{if(e.lengthComputable)showProgress(Math.round(e.loaded/e.total*100));};
    xhr.onload=()=>{hideProgress();const d=JSON.parse(xhr.responseText);if(d.secure_url)res(d.secure_url);else rej();};
    xhr.onerror=()=>{hideProgress();rej();};
    xhr.open('POST',`https://api.cloudinary.com/v1_1/${CLOUD}/${resType}/upload`);
    xhr.send(fd);
  });
}
function showProgress(p){document.getElementById('upload-progress-wrap').innerHTML=`<div class="upload-progress"><span>${p<100?'Uploading...':'Almost done...'}</span><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div><span>${p}%</span></div>`;}
function hideProgress(){document.getElementById('upload-progress-wrap').innerHTML='';}

window.handleImageUpload=async function(e){
  const file=e.target.files[0];if(!file||!myId)return;e.target.value='';
  try{const url=await uploadToCloudinary(file,'image');const msgData={sender:myId,type:'image',url,timestamp:Date.now()};if(replyTo)msgData.replyTo=replyTo;push(ref(db,'messages'),msgData);window.cancelReply();}
  catch{alert('Failed to upload image.');}
};

function startRecording(){
  if(isRecording)return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    mediaRecorder=new MediaRecorder(stream);audioChunks=[];
    mediaRecorder.ondataavailable=ev=>audioChunks.push(ev.data);
    mediaRecorder.start();isRecording=true;recSeconds=0;
    document.getElementById('rec-indicator').style.display='flex';
    document.getElementById('voice-btn').classList.add('recording');
    recInterval=setInterval(()=>{recSeconds++;const m=Math.floor(recSeconds/60),s=recSeconds%60;document.getElementById('rec-timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;},1000);
  }).catch(()=>alert('Microphone access denied.'));
}
function stopRecording(){
  if(!isRecording||!mediaRecorder)return;
  clearInterval(recInterval);isRecording=false;
  document.getElementById('rec-indicator').style.display='none';
  document.getElementById('voice-btn').classList.remove('recording');
  const dur=(()=>{const m=Math.floor(recSeconds/60),s=recSeconds%60;return`${m}:${s.toString().padStart(2,'0')}`;})();
  mediaRecorder.stop();
  mediaRecorder.onstop=async()=>{
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    if(recSeconds<1)return;
    const blob=new Blob(audioChunks,{type:'audio/webm'});
    try{const url=await uploadToCloudinary(blob,'video');const msgData={sender:myId,type:'voice',url,duration:dur,timestamp:Date.now()};if(replyTo)msgData.replyTo=replyTo;push(ref(db,'messages'),msgData);window.cancelReply();}
    catch{alert('Failed to send voice message.');}
  };
}
window.cancelRecording=function(){
  if(!mediaRecorder)return;clearInterval(recInterval);isRecording=false;
  mediaRecorder.stream.getTracks().forEach(t=>t.stop());mediaRecorder=null;audioChunks=[];
  document.getElementById('rec-indicator').style.display='none';
  document.getElementById('voice-btn').classList.remove('recording');
};
window.openLightbox=function(url){document.getElementById('lightbox-img').src=url;document.getElementById('lightbox').classList.add('open');};
window.closeLightbox=function(){document.getElementById('lightbox').classList.remove('open');};
</script>
